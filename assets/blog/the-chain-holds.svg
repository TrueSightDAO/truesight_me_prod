<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bgChain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1712"/>
      <stop offset="100%" stop-color="#3d2b1f"/>
    </linearGradient>

    <radialGradient id="haloChain" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#e8a838" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#c75b2a" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#1f1712" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bgChain)" rx="8"/>

  <!-- Four chain links, interlocking. Each link is a rounded rect rendered
       stroked-only, alternating orientation so adjacent links cross at right
       angles (the visual grammar of an actual chain). -->

  <!-- Subtle halo behind link 1 — the named, witnessed position. -->
  <ellipse cx="180" cy="210" rx="120" ry="105" fill="url(#haloChain)"/>

  <!-- LINK 1 (lit) — horizontal orientation -->
  <g transform="translate(180, 210)">
    <rect x="-58" y="-32" width="116" height="64" rx="32" ry="32"
          fill="none" stroke="#e8a838" stroke-width="3.2"/>
    <rect x="-50" y="-24" width="100" height="48" rx="24" ry="24"
          fill="none" stroke="#e8a838" stroke-width="0.9" opacity="0.45"/>
  </g>

  <!-- LINK 2 — vertical orientation, overlapping link 1 -->
  <g transform="translate(286, 210)">
    <rect x="-32" y="-58" width="64" height="116" rx="32" ry="32"
          fill="none" stroke="#c89767" stroke-width="2.6" opacity="0.85"/>
  </g>

  <!-- LINK 3 — horizontal orientation, overlapping link 2 -->
  <g transform="translate(392, 210)">
    <rect x="-58" y="-32" width="116" height="64" rx="32" ry="32"
          fill="none" stroke="#a67c52" stroke-width="2.4" opacity="0.78"/>
  </g>

  <!-- LINK 4 — vertical orientation, overlapping link 3 -->
  <g transform="translate(498, 210)">
    <rect x="-32" y="-58" width="64" height="116" rx="32" ry="32"
          fill="none" stroke="#8c6643" stroke-width="2.2" opacity="0.7"/>
  </g>

  <!-- Trailing fade — the queue of the next ninety-two, suggested by three
       progressively dim oval ghosts continuing off to the right. -->
  <g opacity="0.5">
    <rect x="546" y="178" width="116" height="64" rx="32" ry="32"
          fill="none" stroke="#6b4226" stroke-width="1.8" opacity="0.7"/>
    <rect x="620" y="152" width="64" height="116" rx="32" ry="32"
          fill="none" stroke="#6b4226" stroke-width="1.4" opacity="0.5"/>
    <rect x="668" y="178" width="116" height="64" rx="32" ry="32"
          fill="none" stroke="#6b4226" stroke-width="1.0" opacity="0.3"/>
  </g>

  <!-- A handwritten-style label hanging off link 1, the way the
       "PATTERN" label hangs in three-times-is-when-you-name-it.svg.
       This is the moment a name lands on a position in the chain. -->
  <line x1="200" y1="180" x2="248" y2="120" stroke="#a67c52" stroke-width="1" opacity="0.7"/>
  <g transform="translate(248, 120) rotate(-5)">
    <rect x="0" y="-13" width="172" height="26" rx="3"
          fill="#f7e6c1" stroke="#c75b2a" stroke-width="1.2"/>
    <circle cx="6" cy="0" r="2" fill="#3d2b1f" opacity="0.85"/>
    <text x="92" y="5" font-family="Space Grotesk, Inter, system-ui, sans-serif"
          font-size="11" font-weight="600" fill="#6b4226" text-anchor="middle"
          letter-spacing="0.05em">AYESHA · KARACHI · 2024</text>
  </g>

  <!-- Role labels under each of the four named links. -->
  <g font-family="Space Grotesk, Inter, system-ui, sans-serif"
     font-size="11" font-weight="600" fill="#a67c52" opacity="0.85"
     text-anchor="middle" letter-spacing="0.12em">
    <text x="180" y="305">STUDENT</text>
    <text x="286" y="305">ATTESTOR</text>
    <text x="392" y="305">INSTITUTION</text>
    <text x="498" y="305">REGISTRY</text>
  </g>

  <!-- Caption under the chain. -->
  <text x="400" y="370" font-family="Inter, system-ui, sans-serif"
        font-size="13" fill="#a67c52" opacity="0.55"
        text-anchor="middle" font-style="italic">
    the chain is the position; the position is what an angel cannot enter
  </text>
</svg>
