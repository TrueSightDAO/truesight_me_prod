<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="Two mirrors: a signed DAO ledger row on the left, an I Ching trigram (Li, Fire) on the right, joined by a warm vertical seam">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1712"/>
      <stop offset="100%" stop-color="#3d2b1f"/>
    </linearGradient>
    <linearGradient id="leftGlow" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#c75b2a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1f1712" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rightGlow" x1="1" y1="0.5" x2="0" y2="0.5">
      <stop offset="0%" stop-color="#e8a838" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1f1712" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="seam" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e8a838" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e8a838" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e8a838" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)" rx="8"/>

  <!-- Side glows -->
  <rect x="0"   y="0" width="400" height="420" fill="url(#leftGlow)"/>
  <rect x="400" y="0" width="400" height="420" fill="url(#rightGlow)"/>

  <!-- Central seam: warm vertical line, the "and" between ledgers -->
  <rect x="398" y="40" width="4" height="340" fill="url(#seam)"/>
  <circle cx="400" cy="210" r="6" fill="#e8a838" opacity="0.85"/>
  <circle cx="400" cy="210" r="14" fill="none" stroke="#e8a838" stroke-width="1" opacity="0.35"/>

  <!-- ── LEFT PANEL: the DAO ledger ───────────────────────────── -->
  <g font-family="'Space Grotesk', 'Inter', sans-serif" fill="#a67c52">
    <text x="60" y="70" font-size="13" letter-spacing="3" opacity="0.7">DAO LEDGER</text>
  </g>

  <!-- Three signed ledger rows (geometric, structured) -->
  <g>
    <!-- Row 1 -->
    <rect x="60" y="155" width="300" height="28" rx="4" fill="#2b1f17" stroke="#a67c52" stroke-width="1" opacity="0.85"/>
    <rect x="68"  y="163" width="56" height="12" rx="2" fill="#c75b2a" opacity="0.55"/>
    <rect x="132" y="163" width="120" height="12" rx="2" fill="#a67c52" opacity="0.35"/>
    <rect x="260" y="163" width="92"  height="12" rx="2" fill="#a67c52" opacity="0.22"/>
    <!-- Row 2 -->
    <rect x="60" y="195" width="300" height="28" rx="4" fill="#2b1f17" stroke="#a67c52" stroke-width="1" opacity="0.85"/>
    <rect x="68"  y="203" width="56" height="12" rx="2" fill="#c75b2a" opacity="0.55"/>
    <rect x="132" y="203" width="92"  height="12" rx="2" fill="#a67c52" opacity="0.35"/>
    <rect x="232" y="203" width="120" height="12" rx="2" fill="#a67c52" opacity="0.22"/>
    <!-- Row 3 -->
    <rect x="60" y="235" width="300" height="28" rx="4" fill="#2b1f17" stroke="#a67c52" stroke-width="1" opacity="0.85"/>
    <rect x="68"  y="243" width="56" height="12" rx="2" fill="#c75b2a" opacity="0.55"/>
    <rect x="132" y="243" width="148" height="12" rx="2" fill="#a67c52" opacity="0.35"/>
    <rect x="288" y="243" width="64"  height="12" rx="2" fill="#a67c52" opacity="0.22"/>
  </g>

  <!-- Signature glyph (key + hash) -->
  <g stroke="#e8a838" stroke-width="1.5" fill="none" opacity="0.7">
    <circle cx="80" cy="305" r="8"/>
    <line x1="88" y1="305" x2="108" y2="305"/>
    <line x1="100" y1="305" x2="100" y2="312"/>
    <line x1="106" y1="305" x2="106" y2="312"/>
  </g>
  <text x="120" y="310" font-family="'Space Grotesk', monospace" font-size="11" fill="#a67c52" opacity="0.65" letter-spacing="2">RSA-2048 · SIGNED · APPEND-ONLY</text>

  <!-- ── RIGHT PANEL: the 道 ledger ──────────────────────────── -->
  <g font-family="'Space Grotesk', 'Inter', sans-serif" fill="#a67c52" text-anchor="end">
    <text x="740" y="70" font-size="13" letter-spacing="3" opacity="0.7">道 LEDGER</text>
  </g>

  <!-- Trigram ☲ Li (Fire) — solid, broken, solid — clarity / illumination
       Mirroring the three ledger rows at the same vertical positions -->
  <g fill="#e8a838">
    <!-- Top: solid (yang) -->
    <rect x="440" y="159" width="300" height="20" rx="3" opacity="0.9"/>
    <!-- Middle: broken (yin) -->
    <rect x="440" y="199" width="130" height="20" rx="3" opacity="0.9"/>
    <rect x="610" y="199" width="130" height="20" rx="3" opacity="0.9"/>
    <!-- Bottom: solid (yang) -->
    <rect x="440" y="239" width="300" height="20" rx="3" opacity="0.9"/>
  </g>

  <!-- Coin cast glyph: three small circles (the I Ching coins) -->
  <g fill="none" stroke="#e8a838" stroke-width="1.5" opacity="0.7">
    <circle cx="700" cy="305" r="9"/>
    <circle cx="676" cy="305" r="9"/>
    <circle cx="652" cy="305" r="9"/>
  </g>
  <g fill="#e8a838" opacity="0.85">
    <circle cx="700" cy="305" r="2.5"/>
    <circle cx="676" cy="305" r="2.5"/>
  </g>
  <text x="640" y="310" font-family="'Space Grotesk', monospace" font-size="11" fill="#a67c52" opacity="0.65" letter-spacing="2" text-anchor="end">CAST · I CHING · QMDJ · WHEN-TO-ACT</text>

  <!-- Bottom anchor line: the shared mission -->
  <line x1="60" y1="365" x2="740" y2="365" stroke="#a67c52" stroke-width="0.5" opacity="0.3"/>
  <text x="400" y="390" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="12" fill="#e8a838" opacity="0.85" text-anchor="middle" letter-spacing="2">AUDIT WITH ONE · DECIDE WITH THE OTHER</text>
</svg>
