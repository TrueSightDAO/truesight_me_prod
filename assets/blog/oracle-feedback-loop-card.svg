<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="cardTitle cardDesc">
  <title id="cardTitle">The oracle feedback loop</title>
  <desc id="cardDesc">A stylised feedback loop: daily DAO activity captured as signals, flowing into a central snapshot document read by an oracle hexagram, which produces contextual advice that shapes the next day.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#f7e8c4"/>
    </radialGradient>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d38900"/>
    </marker>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <g font-family="Inter, sans-serif" fill="#2b1d14" text-anchor="middle">
    <!-- Outer ring: three input icons around a central doc -->
    <!-- Central snapshot doc -->
    <g transform="translate(260,130)">
      <rect width="120" height="110" rx="10" ry="10" fill="#f4a300" stroke="#8a5a00" stroke-width="1.8"/>
      <text x="60" y="36" font-size="13" font-weight="700">ADVISORY</text>
      <text x="60" y="54" font-size="13" font-weight="700">SNAPSHOT</text>
      <text x="60" y="78" font-size="10" fill="#2b1d14">one markdown</text>
      <text x="60" y="93" font-size="10" fill="#2b1d14">file, refreshed</text>
      <text x="60" y="105" font-size="10" fill="#2b1d14">every 6 hours</text>
    </g>

    <!-- Left: git glyph -->
    <g transform="translate(80,40)">
      <circle cx="40" cy="40" r="40" fill="#fff4d6" stroke="#d38900" stroke-width="1.5"/>
      <text x="40" y="48" font-size="26" font-weight="700" fill="#d38900">&lt;/&gt;</text>
      <text x="40" y="100" font-size="11" font-weight="600">git merges</text>
    </g>

    <!-- Left-mid: sheets glyph -->
    <g transform="translate(80,200)">
      <circle cx="40" cy="40" r="40" fill="#fff4d6" stroke="#d38900" stroke-width="1.5"/>
      <g transform="translate(15,22)" stroke="#d38900" stroke-width="1.4" fill="none">
        <rect x="0" y="0" width="50" height="34"/>
        <line x1="0" y1="11" x2="50" y2="11"/>
        <line x1="0" y1="22" x2="50" y2="22"/>
        <line x1="17" y1="0" x2="17" y2="34"/>
        <line x1="34" y1="0" x2="34" y2="34"/>
        <rect x="34" y="22" width="16" height="12" fill="#f4a300" stroke="none"/>
      </g>
      <text x="40" y="100" font-size="11" font-weight="600">live sheets</text>
    </g>

    <!-- Top-right: reminders glyph -->
    <g transform="translate(480,40)">
      <circle cx="40" cy="40" r="40" fill="#fff4d6" stroke="#d38900" stroke-width="1.5"/>
      <g transform="translate(26,14)" stroke="#d38900" stroke-width="1.4" fill="none">
        <rect x="0" y="0" width="28" height="48" rx="4" ry="4"/>
        <line x1="0" y1="6" x2="28" y2="6"/>
        <line x1="0" y1="40" x2="28" y2="40"/>
        <circle cx="14" cy="44" r="1.3" fill="#d38900" stroke="none"/>
        <line x1="6" y1="14" x2="22" y2="14"/>
        <line x1="6" y1="22" x2="22" y2="22"/>
        <line x1="6" y1="30" x2="22" y2="30"/>
      </g>
      <text x="40" y="100" font-size="11" font-weight="600">reminders</text>
    </g>

    <!-- Right: oracle hexagram glyph -->
    <g transform="translate(480,200)">
      <circle cx="40" cy="40" r="40" fill="#f6c86d" stroke="#d38900" stroke-width="1.5"/>
      <!-- 6 horizontal I Ching lines -->
      <g transform="translate(16,16)" fill="#2b1d14">
        <rect x="0" y="0" width="48" height="4"/>
        <rect x="0" y="8" width="21" height="4"/>
        <rect x="27" y="8" width="21" height="4"/>
        <rect x="0" y="16" width="48" height="4"/>
        <rect x="0" y="24" width="48" height="4"/>
        <rect x="0" y="32" width="21" height="4"/>
        <rect x="27" y="32" width="21" height="4"/>
        <rect x="0" y="40" width="48" height="4"/>
      </g>
      <text x="40" y="100" font-size="11" font-weight="600">oracle</text>
    </g>

    <!-- Arrows converging into the center doc -->
    <g stroke="#d38900" stroke-width="2" fill="none">
      <!-- from git -->
      <path d="M 165 90 Q 220 120 260 160" marker-end="url(#a)"/>
      <!-- from sheets -->
      <path d="M 165 235 Q 220 215 260 195" marker-end="url(#a)"/>
      <!-- from reminders -->
      <path d="M 475 90 Q 430 120 380 160" marker-end="url(#a)"/>
      <!-- out to oracle -->
      <path d="M 380 215 Q 430 220 475 235" marker-end="url(#a)"/>
    </g>

    <!-- Loop-back arc underneath showing advice flowing back to inputs -->
    <path d="M 520 260 Q 320 340 120 260" stroke="#6f5a44" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#a)"/>

    <!-- Caption under loop-back -->
    <text x="320" y="332" font-size="11" fill="#6f5a44" font-style="italic">
      advice from today shapes tomorrow&apos;s activity
    </text>

    <!-- Title -->
    <text x="320" y="28" font-size="15" font-weight="700">the oracle feedback loop</text>
  </g>
</svg>
