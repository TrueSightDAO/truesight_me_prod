<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1712"/>
      <stop offset="100%" stop-color="#3d2b1f"/>
    </linearGradient>
    <linearGradient id="warmGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8a838" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#c75b2a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1f1712" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="soulGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c75b2a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e8a838" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg2)" rx="8"/>

  <!-- Organic warm shapes — soul / human side -->
  <ellipse cx="220" cy="210" rx="160" ry="140" fill="url(#warmGlow)"/>
  <ellipse cx="180" cy="180" rx="80" ry="70" fill="#e8a838" opacity="0.08"/>
  <ellipse cx="280" cy="260" rx="60" ry="50" fill="#c75b2a" opacity="0.1"/>

  <!-- Cacao branch silhouette suggestion -->
  <g stroke="#a67c52" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round">
    <path d="M 120 320 Q 140 280 160 290 Q 180 260 200 270"/>
    <path d="M 160 290 Q 170 250 180 240"/>
    <ellipse cx="180" cy="235" rx="6" ry="8" fill="#6b4226" stroke="none" opacity="0.5"/>
    <ellipse cx="195" cy="265" rx="5" ry="7" fill="#6b4226" stroke="none" opacity="0.4"/>
  </g>

  <!-- Machine side — subtle grid / circuit suggestion -->
  <g stroke="#5a8a9c" stroke-width="0.8" fill="none" opacity="0.15">
    <line x1="520" y1="80" x2="520" y2="340"/>
    <line x1="580" y1="80" x2="580" y2="340"/>
    <line x1="640" y1="80" x2="640" y2="340"/>
    <line x1="700" y1="80" x2="700" y2="340"/>
    <line x1="480" y1="120" x2="740" y2="120"/>
    <line x1="480" y1="180" x2="740" y2="180"/>
    <line x1="480" y1="240" x2="740" y2="240"/>
    <line x1="480" y1="300" x2="740" y2="300"/>
  </g>

  <!-- Connection nodes on machine side -->
  <g fill="#5a8a9c" opacity="0.25">
    <circle cx="520" cy="120" r="3"/>
    <circle cx="580" cy="180" r="3"/>
    <circle cx="640" cy="240" r="3"/>
    <circle cx="700" cy="300" r="3"/>
    <circle cx="580" cy="120" r="2"/>
    <circle cx="640" cy="180" r="2"/>
    <circle cx="700" cy="240" r="2"/>
  </g>

  <!-- Diagonal dividing energy -->
  <line x1="350" y1="80" x2="450" y2="340" stroke="#e8ddd4" stroke-width="1" opacity="0.1" stroke-dasharray="4 4"/>

  <!-- Human icon — simple, warm -->
  <g transform="translate(200, 200)">
    <circle cx="0" cy="-25" r="18" fill="none" stroke="#e8a838" stroke-width="2" opacity="0.7"/>
    <path d="M -22 15 Q -30 45 -25 60" stroke="#e8a838" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 22 15 Q 30 45 25 60" stroke="#e8a838" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M -18 10 Q 0 -5 18 10 Q 22 25 15 45 Q 0 50 -15 45 Q -22 25 -18 10" fill="none" stroke="#e8a838" stroke-width="2" opacity="0.5"/>
    <!-- Heart / soul center -->
    <circle cx="0" cy="15" r="5" fill="#c75b2a" opacity="0.6"/>
  </g>

  <!-- Machine icon — simple, geometric -->
  <g transform="translate(620, 200)">
    <rect x="-22" y="-35" width="44" height="70" rx="4" fill="none" stroke="#5a8a9c" stroke-width="2" opacity="0.5"/>
    <rect x="-14" y="-25" width="28" height="18" rx="2" fill="none" stroke="#5a8a9c" stroke-width="1.5" opacity="0.4"/>
    <line x1="-14" y1="5" x2="14" y2="5" stroke="#5a8a9c" stroke-width="1.5" opacity="0.4"/>
    <line x1="-14" y1="15" x2="8" y2="15" stroke="#5a8a9c" stroke-width="1.5" opacity="0.4"/>
    <line x1="-14" y1="25" x2="14" y2="25" stroke="#5a8a9c" stroke-width="1.5" opacity="0.4"/>
    <!-- Gear suggestion -->
    <circle cx="0" cy="45" r="10" fill="none" stroke="#5a8a9c" stroke-width="1.5" opacity="0.35"/>
    <line x1="0" y1="35" x2="0" y2="30" stroke="#5a8a9c" stroke-width="1.5" opacity="0.35"/>
    <line x1="0" y1="55" x2="0" y2="60" stroke="#5a8a9c" stroke-width="1.5" opacity="0.35"/>
    <line x1="-10" y1="45" x2="-15" y2="45" stroke="#5a8a9c" stroke-width="1.5" opacity="0.35"/>
    <line x1="10" y1="45" x2="15" y2="45" stroke="#5a8a9c" stroke-width="1.5" opacity="0.35"/>
  </g>

  <!-- Labels -->
  <text x="200" y="340" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="600" fill="#e8a838" opacity="0.9">HUMAN</text>
  <text x="200" y="358" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#b8a89a" opacity="0.7">Soul. Relationships. Zeigeist.</text>

  <text x="620" y="340" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="600" fill="#5a8a9c" opacity="0.9">MACHINE</text>
  <text x="620" y="358" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#b8a89a" opacity="0.7">Deploys. Ledgers. Prompts.</text>

  <!-- Center quote -->
  <text x="400" y="210" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="600" fill="#e8ddd4" opacity="0.9">The Do Nothing Society</text>
  <text x="400" y="235" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#b8a89a" opacity="0.8">Let machines run the chain.</text>
  <text x="400" y="252" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#b8a89a" opacity="0.8">Let humans hold the soul.</text>
</svg>
