<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="A warm cacao cup with a QR code on the left and a cool grid of supply crates on the right, joined across the seam by a chain of signed links — the same provenance tracking, two different cargoes.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17120f"/>
      <stop offset="1" stop-color="#0e1416"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- LEFT: warm — cacao + its QR -->
  <g fill="none" stroke="#e3a45a" stroke-width="5">
    <!-- cup -->
    <path d="M150 250 h150 v70 a75 75 0 0 1 -150 0 z" fill="#3a2a1c" stroke="#e3a45a"/>
    <path d="M300 268 a34 34 0 0 1 0 60" />
    <!-- rising steam -->
    <path d="M200 235 q14 -22 0 -44" stroke-width="4" opacity="0.7"/>
    <path d="M250 235 q14 -22 0 -44" stroke-width="4" opacity="0.7"/>
  </g>
  <!-- QR motif (warm) -->
  <g fill="#e3a45a">
    <rect x="150" y="400" width="120" height="120" fill="none" stroke="#e3a45a" stroke-width="5"/>
    <rect x="168" y="418" width="28" height="28"/>
    <rect x="224" y="418" width="28" height="28"/>
    <rect x="168" y="474" width="28" height="28"/>
    <rect x="210" y="460" width="16" height="16"/>
    <rect x="238" y="488" width="14" height="14"/>
    <rect x="196" y="446" width="14" height="14"/>
  </g>

  <!-- RIGHT: cool — supply crates / materiel grid -->
  <g fill="none" stroke="#5f9ea0" stroke-width="5">
    <rect x="900" y="250" width="80" height="80"/>
    <rect x="990" y="250" width="80" height="80"/>
    <rect x="945" y="340" width="80" height="80"/>
    <rect x="900" y="430" width="80" height="80"/>
    <rect x="990" y="430" width="80" height="80"/>
  </g>
  <g fill="#5f9ea0" opacity="0.85">
    <circle cx="940" cy="290" r="6"/><circle cx="1030" cy="290" r="6"/>
    <circle cx="985" cy="380" r="6"/>
    <circle cx="940" cy="470" r="6"/><circle cx="1030" cy="470" r="6"/>
  </g>

  <!-- SEAM + chain of signed links spanning both halves -->
  <line x1="600" y1="70" x2="600" y2="560" stroke="#3b3530" stroke-width="2" stroke-dasharray="6 10"/>
  <g fill="none" stroke-width="9" stroke-linecap="round">
    <ellipse cx="430" cy="315" rx="46" ry="26" stroke="#e3a45a"/>
    <ellipse cx="515" cy="315" rx="46" ry="26" stroke="#d9a565"/>
    <ellipse cx="600" cy="315" rx="46" ry="26" stroke="#9a9e7e"/>
    <ellipse cx="685" cy="315" rx="46" ry="26" stroke="#7a9e8f"/>
    <ellipse cx="770" cy="315" rx="46" ry="26" stroke="#5f9ea0"/>
  </g>
</svg>
