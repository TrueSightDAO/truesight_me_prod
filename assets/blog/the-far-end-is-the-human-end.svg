<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <!-- Background: warm earth tone on left fading to cool grid on right -->
    <linearGradient id="feBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e2a17"/>
      <stop offset="48%" stop-color="#2c2418"/>
      <stop offset="52%" stop-color="#1d1f25"/>
      <stop offset="100%" stop-color="#10151c"/>
    </linearGradient>

    <!-- Canopy gradient: rainforest green-gold -->
    <radialGradient id="feCanopy" cx="0.5" cy="0.55" r="0.7">
      <stop offset="0%" stop-color="#7ba65e" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#4a6b3a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1e2a17" stop-opacity="0"/>
    </radialGradient>

    <!-- Grove glow for the tended trees -->
    <radialGradient id="feGrove" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#f4cf85" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1e2a17" stop-opacity="0"/>
    </radialGradient>

    <!-- Warm thread that crosses from left (organic) to right (machine) -->
    <linearGradient id="feThread" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8a838" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e8a838" stop-opacity="0.55"/>
    </linearGradient>

    <!-- Grid line color (cool side) -->
    <linearGradient id="feLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b8aa8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3c4f63" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background fade -->
  <rect x="0" y="0" width="800" height="420" fill="url(#feBg)"/>

  <!-- LEFT HALF: rainforest grove with tended canopy + small human figures -->
  <!-- Canopy haze -->
  <ellipse cx="200" cy="220" rx="220" ry="170" fill="url(#feCanopy)"/>
  <!-- Grove warmth -->
  <ellipse cx="200" cy="280" rx="120" ry="80" fill="url(#feGrove)"/>

  <!-- Central tree, organic and hand-drawn feel -->
  <g transform="translate(200,310)">
    <!-- trunk -->
    <path d="M -6 0 Q -10 -50 -4 -100 Q 0 -130 4 -100 Q 10 -50 6 0 Z" fill="#3a2c1c"/>
    <!-- canopy layers -->
    <ellipse cx="0" cy="-130" rx="65" ry="45" fill="#4a6b3a" opacity="0.95"/>
    <ellipse cx="-20" cy="-145" rx="42" ry="28" fill="#5e8047" opacity="0.85"/>
    <ellipse cx="22" cy="-150" rx="38" ry="26" fill="#5e8047" opacity="0.8"/>
    <ellipse cx="0" cy="-165" rx="35" ry="22" fill="#7ba65e" opacity="0.75"/>
    <!-- cacao pods on trunk -->
    <ellipse cx="-3" cy="-50" rx="4" ry="8" fill="#c75b2a"/>
    <ellipse cx="5" cy="-78" rx="3" ry="6" fill="#a14a26"/>
  </g>

  <!-- Three smaller trees in the grove (siblings) -->
  <g opacity="0.7">
    <ellipse cx="105" cy="245" rx="28" ry="35" fill="#4a6b3a"/>
    <rect x="103" y="265" width="4" height="35" fill="#3a2c1c"/>
    <ellipse cx="285" cy="240" rx="32" ry="38" fill="#5e8047"/>
    <rect x="283" y="262" width="4" height="40" fill="#3a2c1c"/>
    <ellipse cx="60" cy="280" rx="20" ry="25" fill="#4a6b3a"/>
    <rect x="58" y="296" width="4" height="22" fill="#3a2c1c"/>
  </g>

  <!-- Small human figures at the base of the grove — warm-organic -->
  <g fill="#e8a838" opacity="0.92">
    <!-- figure A: kneeling beside main tree -->
    <circle cx="170" cy="335" r="5"/>
    <path d="M 165 340 Q 170 348 175 340 L 178 360 L 162 360 Z"/>
    <!-- figure B: standing with arm raised toward tree -->
    <circle cx="240" cy="328" r="5"/>
    <path d="M 235 333 L 245 333 L 247 360 L 233 360 Z"/>
    <path d="M 245 335 L 252 320" stroke="#e8a838" stroke-width="2" fill="none"/>
    <!-- figure C: smaller, by the side tree -->
    <circle cx="100" cy="298" r="4"/>
    <path d="M 96 302 L 104 302 L 106 320 L 94 320 Z"/>
  </g>

  <!-- Soft ground in the grove -->
  <path d="M 0 360 Q 200 350 400 365 L 400 420 L 0 420 Z" fill="#2c2418" opacity="0.7"/>

  <!-- RIGHT HALF: clean abstract grid of operations -->
  <!-- Vertical & horizontal grid lines -->
  <g stroke="url(#feLine)" stroke-width="1" fill="none">
    <line x1="450" y1="40" x2="450" y2="380"/>
    <line x1="520" y1="40" x2="520" y2="380"/>
    <line x1="590" y1="40" x2="590" y2="380"/>
    <line x1="660" y1="40" x2="660" y2="380"/>
    <line x1="730" y1="40" x2="730" y2="380"/>
    <line x1="420" y1="80" x2="780" y2="80"/>
    <line x1="420" y1="160" x2="780" y2="160"/>
    <line x1="420" y1="240" x2="780" y2="240"/>
    <line x1="420" y1="320" x2="780" y2="320"/>
  </g>

  <!-- Small dashboard tiles, no human figures -->
  <g fill="#2a3a4d" stroke="#6b8aa8" stroke-width="1" opacity="0.85">
    <rect x="455" y="85" width="60" height="70" rx="3"/>
    <rect x="525" y="85" width="60" height="70" rx="3"/>
    <rect x="595" y="85" width="60" height="70" rx="3"/>
    <rect x="665" y="85" width="60" height="70" rx="3"/>
    <rect x="455" y="165" width="60" height="70" rx="3"/>
    <rect x="525" y="165" width="60" height="70" rx="3"/>
    <rect x="595" y="165" width="60" height="70" rx="3"/>
    <rect x="665" y="165" width="60" height="70" rx="3"/>
    <rect x="455" y="245" width="60" height="70" rx="3"/>
    <rect x="525" y="245" width="60" height="70" rx="3"/>
    <rect x="595" y="245" width="60" height="70" rx="3"/>
    <rect x="665" y="245" width="60" height="70" rx="3"/>
  </g>

  <!-- Status dots inside tiles -->
  <g fill="#7ba65e" opacity="0.8">
    <circle cx="465" cy="95" r="2"/>
    <circle cx="535" cy="95" r="2"/>
    <circle cx="605" cy="95" r="2"/>
    <circle cx="675" cy="95" r="2"/>
    <circle cx="465" cy="175" r="2"/>
    <circle cx="535" cy="175" r="2"/>
    <circle cx="605" cy="175" r="2"/>
    <circle cx="675" cy="175" r="2"/>
    <circle cx="465" cy="255" r="2"/>
    <circle cx="535" cy="255" r="2"/>
    <circle cx="605" cy="255" r="2"/>
    <circle cx="675" cy="255" r="2"/>
  </g>

  <!-- Tile data lines, abstract -->
  <g stroke="#6b8aa8" stroke-width="1" fill="none" opacity="0.5">
    <line x1="462" y1="120" x2="510" y2="120"/>
    <line x1="462" y1="130" x2="500" y2="130"/>
    <line x1="462" y1="140" x2="505" y2="140"/>
    <line x1="532" y1="200" x2="580" y2="200"/>
    <line x1="532" y1="210" x2="575" y2="210"/>
    <line x1="602" y1="280" x2="650" y2="280"/>
    <line x1="602" y1="290" x2="640" y2="290"/>
  </g>

  <!-- THE THREAD: a single warm line from the grove (organic side) into the grid (machine side) -->
  <!-- It originates from the human figures, passes through the center, and feeds the dashboards -->
  <path d="M 240 330 Q 320 330 380 280 Q 420 240 460 200" stroke="url(#feThread)" stroke-width="2.5" fill="none" opacity="0.95"/>

  <!-- Subtle pulse marker on the thread -->
  <circle cx="380" cy="280" r="3" fill="#e8a838" opacity="0.85"/>

  <!-- Title-area hint: thin warm seam under the diptych -->
  <line x1="40" y1="395" x2="760" y2="395" stroke="#e8a838" stroke-width="0.5" opacity="0.3"/>
</svg>
