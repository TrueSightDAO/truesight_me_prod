name: Visual Consistency Tests

# Interface tests against the LIVE deployed beta site (beta.truesight.me), not
# a PR-time tree. Triggered on a successful GitHub Pages deployment_status so we
# test what users actually get. Same pattern as dapp_beta + agroverse_shop_beta.

on:
  deployment_status:
  workflow_dispatch:

jobs:
  test:
    name: Visual Consistency (beta.truesight.me)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' &&
       github.event.deployment_status.state == 'success' &&
       github.event.deployment.environment == 'github-pages')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright against deployed beta
        run: npm test
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: https://beta.truesight.me
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-beta
          path: playwright-report/
          retention-days: 30
