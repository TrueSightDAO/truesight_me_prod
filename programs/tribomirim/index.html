<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tribo Bahia Mirim | TrueSight DAO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tribo Bahia Mirim — capoeira lineage transmission program, co-credentialed via TrueSight DAO." />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.truesight.me/programs/tribomirim/" />
    <meta property="og:title" content="Tribo Bahia Mirim | TrueSight DAO" />
    <meta property="og:description" content="Youth experiential learning, credentialed on-chain." />
    <meta property="og:image" content="https://www.truesight.me/assets/truesight-logo.png" />

    <link rel="icon" href="https://static.wixstatic.com/ficons/0e2cde_dd65db118f8f499eb06c159d7262167d%7Emv2.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../styles/main.css" />
    <style>
      .program-page { max-width: 920px; margin: 0 auto; padding: var(--space-xl) 0; }
      .program-hero { text-align: center; margin-bottom: var(--space-xl); }
      .program-hero .pill {
        display: inline-block; padding: 0.25rem 0.7rem; background: var(--surface, #f5f5f5);
        border-radius: 999px; font-size: 0.78rem; text-transform: uppercase;
        letter-spacing: 0.08em; font-weight: 600; color: var(--muted, #555);
      }
      .program-hero h1 { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 2.6rem; margin: var(--space-sm) 0 var(--space-xs); }
      .program-hero .partner-line { color: var(--muted, #666); font-size: 0.95rem; margin-top: 0.35rem; }
      .program-tagline { color: var(--muted, #555); max-width: 640px; margin: var(--space-md) auto 0; font-size: 1.05rem; }
      .program-description { margin: var(--space-xl) 0; line-height: 1.65; }
      .program-cta-row { display: flex; gap: var(--space-md); justify-content: center; flex-wrap: wrap; margin-top: var(--space-xl); }
      .program-cta {
        display: inline-block; padding: 0.7rem 1.4rem; border-radius: 999px;
        font-weight: 600; text-decoration: none;
      }
      .program-cta.primary { background: #6a4a1a; color: #fff; }
      .program-cta.secondary { background: var(--surface, #f5f5f5); color: var(--text, #222); border: 1px solid var(--border, #ddd); }
      .program-cta:hover { transform: translateY(-1px); }

      .cobrand-strip {
        display: flex; align-items: center; gap: 1rem;
        padding: var(--space-md); margin-bottom: var(--space-md);
        background: #fff8ea; border: 1px solid #eed9a8; border-radius: 10px;
      }
      .cobrand-logo { width: 56px; height: 56px; object-fit: contain; flex-shrink: 0; }
      .cobrand-text { flex: 1; }
      .cobrand-line { font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 600; }
      .cobrand-program { font-size: 1rem; }
      .cobrand-divider { margin: 0 0.4rem; color: var(--muted); }
      .cobrand-issuer { font-weight: 400; color: var(--muted, #555); font-size: 0.92rem; }
      .cobrand-issuer a { color: inherit; text-decoration: underline; }
      .cobrand-tagline { color: var(--muted, #666); font-size: 0.88rem; margin-top: 0.25rem; }
      .cobrand-partner-link { display: inline-block; margin-top: 0.5rem; font-size: 0.88rem; color: #6a4a1a; }
    </style>
  </head>
  <body>
    <nav class="site-header">
      <div class="header-container">
        <a href="../../index.html" class="header-logo">
          <img src="https://static.wixstatic.com/media/0e2cde_f81b16c82ebe4aaca4b5ce54b819a693~mv2.png/v1/fill/w_622,h_160,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/20240612_truesight_dao_logo_long.png" alt="TrueSight DAO" width="155" height="40" loading="eager" />
        </a>
        <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
          <span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span>
        </button>
        <ul class="nav-menu" aria-hidden="true">
          <li><a href="../../index.html">Home</a></li>
          <li><a href="../../programs.html">Programs</a></li>
          <li><a href="../../members.html">Members</a></li>
          <li><a href="../../about-us.html">About</a></li>
          <li><a href="../../blog/index.html">Blog</a></li>
        </ul>
      </div>
    </nav>

    <div class="page">
      <div class="program-page">
        <div id="cobrand-strip"></div>

        <div class="program-hero">
          <span class="pill">Experiential learning credentialing</span>
          <h1 id="program-name">Tribo Bahia Mirim</h1>
          <div class="partner-line">By <span id="program-partner">ERA Professionals</span></div>
          <p class="program-tagline" id="program-tagline">Loading…</p>
        </div>

        <div id="program-status"></div>
        <div class="program-description" id="program-description"></div>

        <div class="program-cta-row">
          <a class="program-cta primary" href="members.html">View cohort →</a>
          <a class="program-cta secondary" id="program-source-link" style="display:none" target="_blank" rel="noopener noreferrer">Visit partner site →</a>
        </div>
      </div>
    </div>

    <script src="../../js/program-shell.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        TrueSightProgramShell.init({ manifestPath: './manifest.json', type: 'landing' });
      });
      // Hamburger
      (function() {
        const t = document.querySelector('.menu-toggle');
        const m = document.querySelector('.nav-menu');
        const h = document.querySelector('.site-header');
        if (!t || !m) return;
        t.addEventListener('click', function() {
          const exp = t.getAttribute('aria-expanded') === 'true';
          t.setAttribute('aria-expanded', !exp);
          m.setAttribute('aria-hidden', exp);
          h.classList.toggle('menu-open', !exp);
        });
      })();
    </script>
  </body>
</html>
