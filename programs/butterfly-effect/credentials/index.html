<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Credential — Butterfly Effect | TrueSight DAO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Butterfly Effect participant credential — co-issued via TrueSight DAO." />
    <link rel="icon" href="https://static.wixstatic.com/ficons/0e2cde_dd65db118f8f499eb06c159d7262167d%7Emv2.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../styles/main.css" />
    <style>
      .credential-page { max-width: 760px; margin: 0 auto; padding: var(--space-xl) 0; }
      .credential-error { display: none; color: #c33; background: #fee; padding: var(--space-md); border-radius: 6px; }
      .credential-warn { background: #fff8ea; border: 1px solid #eed9a8; padding: var(--space-md); border-radius: 8px; }
      .credential-header { margin-bottom: var(--space-lg); }
      .credential-name { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 2.2rem; margin: 0; }
      .credential-tagline { color: var(--muted, #666); margin-top: 0.35rem; }
      .credential-section { padding: var(--space-md); background: var(--surface, #fafafa); border: 1px solid var(--border, #e8e8e8); border-radius: 10px; margin-bottom: var(--space-md); }
      .credential-section h2 { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 1.3rem; margin-top: 0; }
      .credential-summary { color: var(--text, #222); font-size: 0.95rem; line-height: 1.6; }
      .credential-events { list-style: none; padding: 0; margin: var(--space-sm) 0 0; }
      .credential-events li { padding: 0.45rem 0; border-bottom: 1px solid var(--border, #eee); font-size: 0.92rem; }
      .credential-events time { font-weight: 600; color: var(--text, #222); margin-right: 0.4rem; }
      .credential-footer { display: flex; gap: var(--space-md); margin-top: var(--space-xl); flex-wrap: wrap; }
      .btn-link {
        display: inline-block; padding: 0.65rem 1.25rem; border-radius: 999px;
        font-weight: 600; text-decoration: none; background: #6a4a1a; color: #fff;
      }
      .btn-link.secondary { background: var(--surface, #f5f5f5); color: var(--text, #222); border: 1px solid var(--border, #ddd); }
      .btn-link:hover { transform: translateY(-1px); }

      .cobrand-strip {
        display: flex; align-items: center; gap: 1rem;
        padding: var(--space-md); margin-bottom: var(--space-md);
        background: #fff8ea; border: 1px solid #eed9a8; border-radius: 10px;
      }
      .cobrand-logo { width: 56px; height: 56px; object-fit: contain; flex-shrink: 0; }
      .cobrand-line { font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 600; }
      .cobrand-program { font-size: 1rem; }
      .cobrand-divider { margin: 0 0.4rem; color: var(--muted); }
      .cobrand-issuer { font-weight: 400; color: var(--muted, #555); font-size: 0.92rem; }
      .cobrand-issuer a { color: inherit; text-decoration: underline; }
      .cobrand-partner-link { display: inline-block; margin-top: 0.5rem; font-size: 0.88rem; color: #6a4a1a; }
    </style>
  </head>
  <body>
    <nav class="site-header">
      <div class="header-container">
        <a href="../../../index.html" class="header-logo">
          <img src="https://static.wixstatic.com/media/0e2cde_f81b16c82ebe4aaca4b5ce54b819a693~mv2.png/v1/fill/w_622,h_160,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/20240612_truesight_dao_logo_long.png" alt="TrueSight DAO" width="155" height="40" loading="eager" />
        </a>
        <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
          <span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span>
        </button>
        <ul class="nav-menu" aria-hidden="true">
          <li><a href="../../../index.html">Home</a></li>
          <li><a href="../../../programs.html">Programs</a></li>
          <li><a href="../index.html">← Butterfly Effect</a></li>
          <li><a href="../members.html">Cohort</a></li>
        </ul>
      </div>
    </nav>

    <div class="page">
      <div class="credential-page">
        <div id="cobrand-strip"></div>
        <div id="credential-status">Loading credential…</div>
        <div id="credential-error" class="credential-error"></div>
        <div id="credential-body"></div>
      </div>
    </div>

    <script src="../../../js/program-shell.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        TrueSightProgramShell.init({ manifestPath: '../manifest.json', type: 'credential' });
      });
      (function() {
        const t = document.querySelector('.menu-toggle');
        const m = document.querySelector('.nav-menu');
        const h = document.querySelector('.site-header');
        if (!t || !m) return;
        t.addEventListener('click', function() {
          const exp = t.getAttribute('aria-expanded') === 'true';
          t.setAttribute('aria-expanded', !exp);
          m.setAttribute('aria-hidden', exp);
          h.classList.toggle('menu-open', !exp);
        });
      })();
    </script>
  </body>
</html>
