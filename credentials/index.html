<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Credential Profile | TrueSight DAO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Public, lineage-anchored credential profile from the TrueSight DAO credentialing platform." />

    <meta property="og:type" content="profile" />
    <meta property="og:url" content="https://www.truesight.me/credentials/" />
    <meta property="og:title" content="Credential Profile | TrueSight DAO" />
    <meta property="og:description" content="Public, lineage-anchored credential profile." />
    <meta property="og:image" content="https://www.truesight.me/assets/truesight-logo.png" />
    <meta property="og:site_name" content="TrueSight DAO" />

    <link
      rel="icon"
      href="https://static.wixstatic.com/ficons/0e2cde_dd65db118f8f499eb06c159d7262167d%7Emv2.ico"
      type="image/x-icon"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/main.css" />
    <style>
      .cv-page { max-width: 880px; margin: 0 auto; padding: var(--space-xl) 0; }
      .cv-header { border-bottom: 2px solid var(--border, #e5e5e5); padding-bottom: var(--space-md); margin-bottom: var(--space-lg); }
      .cv-display-name { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 2.4rem; font-weight: 700; margin: 0 0 0.25rem; color: var(--text, #111); }
      .cv-aliases { color: var(--muted, #666); font-size: 0.95rem; font-style: italic; margin: 0 0 0.25rem; }
      .cv-contact { font-size: 0.95rem; margin: 0 0 0.4rem; }
      .cv-contact a { color: var(--text, #245785); text-decoration: none; }
      .cv-contact a:hover { text-decoration: underline; }
      .cv-meta { color: var(--muted, #666); font-size: 0.95rem; }
      .cv-meta .pill {
        display: inline-block; padding: 0.15rem 0.65rem; margin-left: 0.5rem;
        background: var(--surface, #f5f5f5); border-radius: 999px; font-size: 0.78rem;
        text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
      }
      .cv-section { margin-bottom: var(--space-xl); }
      .cv-section h2 {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 1rem; text-transform: uppercase; letter-spacing: 0.1em;
        color: var(--text, #222); border-bottom: 1px solid var(--border, #ddd);
        padding-bottom: 0.35rem; margin: 0 0 var(--space-sm);
      }
      .cv-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: var(--space-sm); }
      .cv-stats .stat { background: var(--surface, #f8f8f8); padding: var(--space-sm); border-radius: 8px; }
      .cv-stats .stat .label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted, #666); }
      .cv-stats .stat .value { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 1.4rem; font-weight: 700; margin-top: 0.2rem; }
      .cv-events { list-style: none; padding: 0; margin: 0; }
      .cv-events li { padding: 0.6rem 0; border-bottom: 1px dotted var(--border, #e5e5e5); display: flex; gap: 0.75rem; flex-wrap: wrap; }
      .cv-events li:last-child { border-bottom: none; }
      .cv-events .when { font-family: 'Space Grotesk', monospace; font-size: 0.85rem; color: var(--muted, #666); flex: 0 0 auto; }
      .cv-events .what { flex: 1; min-width: 0; }
      .cv-events .source-link { font-size: 0.78rem; }
      .cv-citation { font-size: 0.82rem; color: var(--muted, #666); margin-top: var(--space-sm); }
      .cv-actions { margin: var(--space-lg) 0; display: flex; gap: var(--space-sm); flex-wrap: wrap; }
      .cv-actions .btn {
        display: inline-block; padding: 0.55rem 1.1rem; border-radius: 6px;
        background: var(--text, #111); color: white; text-decoration: none;
        font-weight: 600; font-size: 0.95rem;
      }
      .cv-actions .btn.secondary { background: var(--surface, #eee); color: var(--text, #111); }
      .cv-placeholder { text-align: center; padding: var(--space-xl) 0; color: var(--muted, #666); }
      .cv-placeholder .spinner {
        display: inline-block; width: 36px; height: 36px; border-radius: 50%;
        border: 3px solid var(--surface, #eee); border-top-color: var(--text, #444);
        animation: cv-spin 0.9s linear infinite; margin-bottom: var(--space-md);
      }
      @keyframes cv-spin { to { transform: rotate(360deg); } }
      .cv-error { color: #c33; background: #fee; padding: var(--space-sm); border-radius: 6px; }
    </style>
  </head>
  <body>
    <nav class="site-header">
      <div class="header-container">
        <a href="../index.html" class="header-logo">
          <img
            src="https://static.wixstatic.com/media/0e2cde_f81b16c82ebe4aaca4b5ce54b819a693~mv2.png/v1/fill/w_622,h_160,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/20240612_truesight_dao_logo_long.png"
            alt="TrueSight DAO" width="155" height="40" loading="eager" />
        </a>
        <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
          <span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span>
        </button>
        <ul class="nav-menu" aria-hidden="true">
          <li><a href="../index.html">Home</a></li>
          <li><a href="../about-us.html">About Us</a></li>
          <li><a href="../members.html">Members</a></li>
          <li><a href="../faq.html">FAQ</a></li>
        </ul>
      </div>
    </nav>

    <div class="page">
      <div class="cv-page">
        <div id="cv-placeholder" class="cv-placeholder">
          <div class="spinner"></div>
          <p id="cv-placeholder-text">Loading credential profile…</p>
        </div>
        <div id="cv-error" class="cv-error" style="display:none"></div>
        <article id="cv-content" style="display:none"></article>
      </div>
    </div>

    <script>
      (function () {
        'use strict';

        const DATA_REPO_RAW = 'https://raw.githubusercontent.com/TrueSightDAO/lineage-credentials/main';
        const POLL_INTERVAL_MS = 5000;
        const POLL_TIMEOUT_MS = 5 * 60 * 1000;

        function getSlug() {
          // hash form: #pk-abc123 or #fatima-toledo
          let h = (window.location.hash || '').replace(/^#/, '').trim();
          // tolerate trailing slash or extra slashes
          h = h.replace(/\/+$/, '').replace(/^\/+/, '');
          return h;
        }

        function escapeHtml(s) {
          return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
          });
        }

        function formatDate(s) {
          if (!s) return '';
          // YYYYMMDD compact form (DAO ledger style)
          if (/^\d{8}$/.test(s)) {
            return s.slice(0, 4) + '-' + s.slice(4, 6) + '-' + s.slice(6, 8);
          }
          // ISO with timezone
          const d = new Date(s);
          if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
          return s;
        }

        function showPlaceholder(message) {
          document.getElementById('cv-content').style.display = 'none';
          document.getElementById('cv-error').style.display = 'none';
          document.getElementById('cv-placeholder').style.display = 'block';
          document.getElementById('cv-placeholder-text').textContent = message;
        }

        function showError(message) {
          document.getElementById('cv-content').style.display = 'none';
          document.getElementById('cv-placeholder').style.display = 'none';
          const el = document.getElementById('cv-error');
          el.textContent = message;
          el.style.display = 'block';
        }

        function renderCv(cv) {
          const slug = cv.slug || getSlug();
          const programs = cv.programs || {};
          const dao = cv.dao_contributions || null;
          const hasElectives = cv.has_elective_records;
          const hasDao = cv.has_dao_contributions;

          const identity = cv.identity || {};
          const aliasNames = Array.isArray(identity.names) ? identity.names.slice(1) : [];
          const email = identity.email || '';

          let html = '';
          html += '<div class="cv-header">';
          html += '<h1 class="cv-display-name">' + escapeHtml(cv.display_name || slug) + '</h1>';
          if (aliasNames.length) {
            html += '<div class="cv-aliases">also known as ' + aliasNames.map(escapeHtml).join(', ') + '</div>';
          }
          if (email) {
            html += '<div class="cv-contact"><a href="mailto:' + encodeURIComponent(email) + '">' + escapeHtml(email) + '</a></div>';
          }
          html += '<div class="cv-meta">TrueSight DAO Credential Profile';
          if (cv.pk_hash) html += '<span class="pill">' + escapeHtml(cv.pk_hash) + '</span>';
          if (hasDao) html += '<span class="pill">DAO Contributor</span>';
          if (hasElectives) html += '<span class="pill">Practitioner</span>';
          html += '</div></div>';

          // Actions: PDF download + raw JSON
          html += '<div class="cv-actions">';
          html += '<a class="btn" href="' + DATA_REPO_RAW + '/_cache/cv/' + encodeURIComponent(slug) + '.pdf" target="_blank" rel="noopener">⬇ Download PDF</a>';
          html += '<a class="btn secondary" href="' + DATA_REPO_RAW + '/_cache/cv/' + encodeURIComponent(slug) + '.json" target="_blank" rel="noopener">View source JSON</a>';
          html += '</div>';

          // DAO contributions
          if (hasDao && dao) {
            const summary = (dao.source && dao.source.summary) || {};
            const dr = summary.date_range || dao.date_range || {};
            const totalContrib = (summary.total_contributions != null ? summary.total_contributions : dao.total_contributions) || 0;
            const totalTdg = (summary.total_tdg_provisioned != null ? summary.total_tdg_provisioned : dao.total_tdg_provisioned) || 0;
            const projects = summary.projects || [];

            html += '<section class="cv-section">';
            html += '<h2>DAO Contributions</h2>';
            html += '<div class="cv-stats">';
            html += '<div class="stat"><div class="label">Contributions</div><div class="value">' + totalContrib + '</div></div>';
            html += '<div class="stat"><div class="label">TDG Provisioned</div><div class="value">' + Number(totalTdg).toLocaleString(undefined, { maximumFractionDigits: 2 }) + '</div></div>';
            if (dr.earliest || dr.latest) {
              html += '<div class="stat"><div class="label">Active Period</div><div class="value" style="font-size:1rem">' + escapeHtml(formatDate(dr.earliest)) + ' → ' + escapeHtml(formatDate(dr.latest)) + '</div></div>';
            }
            if (projects.length) {
              html += '<div class="stat"><div class="label">Projects</div><div class="value">' + projects.length + '</div></div>';
            }
            html += '</div>';
            if (projects.length) {
              html += '<p class="cv-citation" style="margin-top:var(--space-sm)"><strong>Projects involved:</strong> ' + projects.map(escapeHtml).join(' · ') + '</p>';
            }
            html += '<p class="cv-citation">Source: <a href="' + DATA_REPO_RAW + '/_cache/cv/' + encodeURIComponent(slug) + '.json" target="_blank" rel="noopener">_cache/cv/' + escapeHtml(slug) + '.json</a></p>';
            html += '</section>';
          }

          // Elective programs (practice events)
          Object.keys(programs).forEach(function (programName) {
            const p = programs[programName];
            html += '<section class="cv-section">';
            html += '<h2>' + escapeHtml(p.display_name || programName) + '</h2>';
            html += '<div class="cv-stats">';
            html += '<div class="stat"><div class="label">Sessions</div><div class="value">' + (p.practice_count || 0) + '</div></div>';
            html += '<div class="stat"><div class="label">Practice Time</div><div class="value">' + (p.total_practice_minutes || 0) + ' min</div></div>';
            if (p.lineage_root) html += '<div class="stat"><div class="label">Lineage</div><div class="value" style="font-size:1rem">' + escapeHtml(p.lineage_root) + '</div></div>';
            html += '</div>';

            const events = p.recent_events || [];
            if (events.length) {
              html += '<h3 style="margin:var(--space-md) 0 var(--space-sm);font-size:0.85rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted,#666)">Recent sessions</h3>';
              html += '<ul class="cv-events">';
              events.slice(0, 10).forEach(function (e) {
                const cap = formatDate(e.captured_at || '');
                const theme = (e.payload && e.payload.theme) || e.practice_type || '';
                const mins = (e.payload && e.payload.total_practice_minutes) || 0;
                const path = e._path || '';
                const src = path
                  ? '<a class="source-link" href="https://github.com/TrueSightDAO/lineage-credentials/blob/main/' + encodeURIComponent(path).replace(/%2F/g, '/') + '" target="_blank" rel="noopener">source</a>'
                  : '';
                html += '<li>';
                html += '<span class="when">' + escapeHtml(cap) + '</span>';
                html += '<span class="what">' + escapeHtml(theme) + ' · ' + mins + ' min</span>';
                html += src;
                html += '</li>';
              });
              html += '</ul>';
            }
            html += '</section>';
          });

          if (!hasElectives && !hasDao) {
            html += '<p style="color:var(--muted,#666);font-style:italic">No records yet.</p>';
          }

          html += '<p class="cv-citation" style="margin-top:var(--space-xl)">Every claim above cites the line in the underlying ledger or repo — open the source link to audit. Profile served from <a href="https://github.com/TrueSightDAO/lineage-credentials" target="_blank" rel="noopener">TrueSightDAO/lineage-credentials</a>.</p>';

          const content = document.getElementById('cv-content');
          content.innerHTML = html;
          document.getElementById('cv-placeholder').style.display = 'none';
          document.getElementById('cv-error').style.display = 'none';
          content.style.display = 'block';
        }

        let pollStartedAt = 0;

        async function loadCv() {
          const slug = getSlug();
          if (!slug) {
            window.location.replace('../members.html');
            return;
          }
          const url = DATA_REPO_RAW + '/_cache/cv/' + encodeURIComponent(slug) + '.json?_=' + Date.now();
          try {
            const res = await fetch(url, { cache: 'no-store' });
            if (res.status === 404) {
              // Not yet indexed → enter polling state.
              if (!pollStartedAt) pollStartedAt = Date.now();
              const elapsed = Date.now() - pollStartedAt;
              if (elapsed > POLL_TIMEOUT_MS) {
                showError('Profile is still being generated after 5 minutes. The pipeline may be backed up — refresh to retry, or contact the DAO.');
                return;
              }
              showPlaceholder('Your credential profile is being generated. This usually takes 30 seconds to a couple of minutes.');
              setTimeout(loadCv, POLL_INTERVAL_MS);
              return;
            }
            if (!res.ok) {
              showError('Failed to load profile: HTTP ' + res.status);
              return;
            }
            const cv = await res.json();
            renderCv(cv);
          } catch (err) {
            showError('Network error: ' + err.message);
          }
        }

        // Re-render whenever the URL hash changes (browser back/forward, etc.)
        window.addEventListener('hashchange', function () { pollStartedAt = 0; loadCv(); });
        document.addEventListener('DOMContentLoaded', loadCv);
      })();
    </script>
  </body>
</html>
